<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    color:white;
    font-family:Arial,sans-serif;
}

.box{
    width:380px;
    background:#111;
    padding:40px;
    border-radius:20px;
}

h1{
    text-align:center;
    color:red;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:red;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>LOGIN</h1>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="loginUser()">LOGIN</button>

</div>

<script>
async function loginUser(){

    const email=document.getElementById("email").value.trim();
    const password=document.getElementById("password").value.trim();

    if(!email || !password){
        alert("Please fill all fields");
        return;
    }

    try{

        const response=await fetch(
            "http://localhost:5000/api/auth/login",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data=await response.json();

        if(response.ok){

            localStorage.setItem(
                "user",
                JSON.stringify(
                    data.user || {
                        name:"Member",
                        email:email
                    }
                )
            );

            alert("Login Successful");

            window.location.href="dashboard.html";

        }else{

            alert(data.msg || "Invalid Credentials");

        }

    }catch(error){

        console.error(error);
        alert("Server Error");

    }
}
</script>

</body>
</html>
