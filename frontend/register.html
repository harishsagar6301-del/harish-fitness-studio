<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <style>

    body{
      background:#111;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:350px;
      background:#222;
      padding:30px;
      border-radius:10px;
    }

    h1{
      color:white;
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:none;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:5px;
      background:#00b894;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Create Account</h1>

    <input
      type="text"
      id="name"
      placeholder="Enter Name"
    >

    <input
      type="email"
      id="email"
      placeholder="Enter Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <button id="registerBtn">
      CREATE ACCOUNT
    </button>

  </div>

<script>

document
.getElementById("registerBtn")
.addEventListener(
  "click",
  async () => {

    const name =
    document.getElementById("name").value;

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    if(!name || !email || !password){

      alert("Please fill all fields");
      return;

    }

    try{

      const response =
      await fetch(
        "http://localhost:5000/api/auth/register",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            name,
            email,
            password
          })
        }
      );

      // IMPORTANT FIX
      const text =
      await response.text();

      console.log(text);

      alert("Registration Successful");

      // FORCE REDIRECT
      window.location.assign(
        "http://127.0.0.1:5500/frontend/login.html"
      );

    }catch(error){

      console.log(error);

      alert("Backend Error");

    }

  }
);

</script>

</body>
</html>
