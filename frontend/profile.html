<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#111;
padding:40px;
border-radius:20px;
width:400px;
}

h1{
text-align:center;
color:red;
margin-bottom:25px;
}

input,
select{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:red;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#cc0000;
}

.bmi-box{
margin-top:20px;
text-align:center;
font-size:20px;
color:#00ff88;
}

</style>

</head>

<body>

<div class="container">

<h1>
My Profile
</h1>

<input
type="text"
id="fullName"
placeholder="Full Name">

<input
type="number"
id="age"
placeholder="Age">

<input
type="number"
id="height"
placeholder="Height (cm)">

<input
type="number"
id="weight"
placeholder="Weight (kg)">


<select id="goal">

<option value="">
Select Goal
</option>

<option value="Weight Loss">
Weight Loss
</option>

<option value="Muscle Gain">
Muscle Gain
</option>

<option value="Fitness">
Fitness
</option>

</select>


<button onclick="saveProfile()">
Save Profile
</button>


<div class="bmi-box">

BMI:
<span id="bmi">
0
</span>

</div>

</div>


<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

window.location.href =
"login.html";

}


/* LOAD PROFILE */

async function loadProfile(){

try{

const response =
await fetch(

`http://localhost:5000/api/profile/${user.email}`

);

const data =
await response.json();

if(data){

document.getElementById(
"fullName"
).value =
data.fullName || "";

document.getElementById(
"age"
).value =
data.age || "";

document.getElementById(
"height"
).value =
data.height || "";

document.getElementById(
"weight"
).value =
data.weight || "";

document.getElementById(
"goal"
).value =
data.goal || "";

document.getElementById(
"bmi"
).innerText =
data.bmi || 0;

}

}catch(error){

console.log(error);

}

}


loadProfile();


/* SAVE PROFILE */

async function saveProfile(){

const fullName =
document.getElementById(
"fullName"
).value;

const age =
document.getElementById(
"age"
).value;

const height =
document.getElementById(
"height"
).value;

const weight =
document.getElementById(
"weight"
).value;

const goal =
document.getElementById(
"goal"
).value;


/* BMI */

const bmi =
(
weight /
((height/100)*(height/100))
).toFixed(1);


try{

const response =
await fetch(

"http://localhost:5000/api/profile/save-profile",

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

userEmail:user.email,

fullName,
age,
height,
weight,
goal,
bmi

})

}

);

const data =
await response.json();

alert(data.msg);

document.getElementById(
"bmi"
).innerText =
bmi;

}catch(error){

console.log(error);

alert(
"Server Error"
);

}

}

</script>

</body>

</html>
